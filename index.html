  <body>
    <script>
      // Apply cached primary color instantly to prevent flash of default color
      (function(){
        try {
          var c = localStorage.getItem('branding_primary_color');
          if (c && /^#[0-9a-fA-F]{6}$/.test(c)) {
            var r=parseInt(c.slice(1,3),16)/255, g=parseInt(c.slice(3,5),16)/255, b=parseInt(c.slice(5,7),16)/255;
            var mx=Math.max(r,g,b), mn=Math.min(r,g,b), h=0, s=0, l=(mx+mn)/2;
            if(mx!==mn){var d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
              if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}
            var hD=Math.round(h*360),sP=Math.round(s*100),lP=Math.round(l*100);
            var cl=function(v,a,b){return Math.max(a,Math.min(b,v));};
            var root=document.documentElement;
            root.style.setProperty('--primary',hD+' '+sP+'% '+lP+'%');
            root.style.setProperty('--accent',hD+' '+cl(sP-8,32,100)+'% '+cl(lP-8,18,58)+'%');
            root.style.setProperty('--success',hD+' '+cl(sP,36,100)+'% '+cl(lP,24,60)+'%');
            root.style.setProperty('--ring',hD+' '+sP+'% '+lP+'%');
            root.style.setProperty('--sidebar-primary',hD+' '+cl(sP+4,40,100)+'% '+cl(lP+6,28,68)+'%');
            root.style.setProperty('--sidebar-ring',hD+' '+sP+'% '+lP+'%');
            root.style.setProperty('--gradient-start',hD+' '+cl(sP,36,100)+'% '+cl(lP-10,18,58)+'%');
            root.style.setProperty('--gradient-end',hD+' '+cl(sP+4,40,100)+'% '+cl(lP+8,28,72)+'%');
          }
        } catch(e){}
      })();
    </script>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
